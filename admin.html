<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>MVL Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-page">
<header class="admin-topbar"><a href="index.html"><img src="assets/hero-mvl-2026-logo.png" alt="MVL 2026"></a><button id="signOutBtn" class="admin-link is-hidden">Sign out</button></header>
<main class="admin-main">
  <section id="loginPanel" class="admin-panel admin-login"><p class="games-label">Restricted access</p><h1>MVL Admin</h1>
    <form id="loginForm" class="admin-form"><label class="field"><span>Email</span><input name="email" type="email" required></label><label class="field"><span>Password</span><input name="password" type="password" required></label><button class="cta cta--primary">Sign in</button><p id="loginStatus" class="form-status"></p></form>
  </section>
  <section id="dashboard" class="is-hidden">
    <div class="admin-heading"><div><p class="games-label">Control room</p><h1>Game Day Admin</h1></div><p id="adminIdentity"></p></div>
    <form id="livestreamForm" class="admin-panel admin-form"><div class="admin-panel-head"><div><p class="games-label">Broadcast</p><h2>Livestream</h2></div><label class="admin-switch"><input name="isLive" type="checkbox"> Live now</label></div><div class="admin-fields"><label class="field"><span>YouTube URL</span><input name="youtubeUrl" type="url"></label><label class="field"><span>YouTube video ID</span><input name="youtubeId"></label></div><button class="cta cta--primary">Save livestream</button><p class="form-status"></p></form>
    <div class="admin-heading admin-games-head"><div><p class="games-label">Scores & recordings</p><h2>Games</h2></div></div><div id="adminGameList"></div>
  </section>
</main>
<script src="js/supabase-config.js"></script><script src="js/league-data.js"></script><script src="js/admin.js"></script>
</body></html>
